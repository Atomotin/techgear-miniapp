<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechGear.uz Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b0b0d;
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px 16px 100px;
    }

    .header {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .header p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      line-height: 1.4;
    }

    .search-box {
      margin-bottom: 14px;
    }

    .search-box input,
    .checkout input,
    .checkout textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      font-size: 15px;
    }

    .search-box input::placeholder,
    .checkout input::placeholder,
    .checkout textarea::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 4px;
    }

    .categories button {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
    }

    .categories button.active {
      background: white;
      color: black;
      font-weight: bold;
    }

    .product-list {
      display: grid;
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      overflow: hidden;
    }

    .card-content {
      padding: 16px;
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .desc {
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .stock {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .variants {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .variant {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-outline {
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .cart-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .cart-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cart-top h4 {
      font-size: 15px;
      line-height: 1.4;
    }

    .cart-price {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-top: 4px;
    }

    .cart-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-controls button {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .section h2 {
      font-size: 22px;
      margin-bottom: 14px;
    }

    .summary {
      background: rgba(0,0,0,0.28);
      border-radius: 16px;
      padding: 14px;
      margin-top: 14px;
      font-size: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 17px;
      font-weight: bold;
      margin-top: 10px;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11,11,13,0.97);
      border-top: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .bottom-nav-inner {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }

    .bottom-nav button,
    .bottom-nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 14px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .bottom-nav button.active {
      background: white;
      color: black;
      font-weight: bold;
    }

    .contact-btn {
      flex: 0.7;
    }

    .hidden {
      display: none;
    }

    .empty-text {
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    .product-image {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

      <h1>TechGear.uz</h1>
      <p>Аксессуары для сетапа, гейминга и рабочего стола</p>
    </div>

    <div id="shopView">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск товара" />
      </div>

      <div class="categories" id="categories"></div>
      <div class="product-list" id="productList"></div>
    </div>

    <div id="cartView" class="hidden">
      <div class="section">
        <h2>Корзина</h2>
        <div id="cartItems"></div>
      </div>

      <div class="section checkout">
        <h2>Оформление заказа</h2>
        <input type="text" id="customerName" placeholder="Ваше имя" style="margin-bottom:10px;" />
        <input type="text" id="customerPhone" placeholder="Телефон" style="margin-bottom:10px;" />
        <input type="text" id="customerDelivery" placeholder="Способ доставки" value="Курьер по Ташкенту" />

        <div class="summary">
          <div class="summary-row">
            <span>Товаров</span>
            <span id="summaryItems">0</span>
          </div>
          <div class="summary-total">
            <span>Итого</span>
            <span id="summaryTotal">0 сум</span>
          </div>
        </div>

        <button class="btn btn-primary" style="width:100%; margin-top:14px;" onclick="submitOrder()">
          Оформить заказ
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="bottom-nav-inner">
      <button id="shopBtn" class="active" onclick="switchView('shop')">Магазин</button>
      <button id="cartBtn" onclick="switchView('cart')">Корзина (0)</button>

        stock: "В наличии",
        variants: ["2 варианта свечения"],
      }

    ];

    const categories = [
      { key: "all", label: "Все" },
      { key: "mouse", label: "Мыши" },
      { key: "keyboard", label: "Клавиатуры" },
      { key: "headphones", label: "Подставки" },
      { key: "lighting", label: "Свет" },
      { key: "decor", label: "Декор" }
    ];

    let activeCategory = "all";
    let search = "";
    let cart = [];

    function formatPrice(value) {
      if (!value) return "Цена по запросу";
      return new Intl.NumberFormat("ru-RU").format(value) + " сум";
    }

    function renderCategories() {
      const wrap = document.getElementById("categories");
      wrap.innerHTML = "";

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat.label;
        if (cat.key === activeCategory) btn.classList.add("active");
        btn.onclick = () => {
          activeCategory = cat.key;
          renderCategories();
          renderProducts();
        };
        wrap.appendChild(btn);
      });
    }

    function getFilteredProducts() {
      return products.filter(product => {
        const byCategory = activeCategory === "all" || product.category === activeCategory;
        const bySearch =
          product.name.toLowerCase().includes(search.toLowerCase()) ||
          product.desc.toLowerCase().includes(search.toLowerCase());
        return byCategory && bySearch;
      });
    }

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const existing = cart.find(item => item.id === productId);

      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...product, qty: 1 });
      }

      renderCart();
      updateCartButton();
    }

    function increaseQty(id) {
      const item = cart.find(i => i.id === id);
      if (item) item.qty += 1;
      renderCart();
      updateCartButton();
    }

    function decreaseQty(id) {
      const item = cart.find(i => i.id === id);
      if (!item) return;

      item.qty -= 1;
      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
      }

      renderCart();
      updateCartButton();
    }

    function removeItem(id) {
      cart = cart.filter(i => i.id !== id);
      renderCart();
      updateCartButton();
    }

    function renderProducts() {
      const list = document.getElementById("productList");
      const filtered = getFilteredProducts();
      list.innerHTML = "";

      if (!filtered.length) {
        list.innerHTML = '<div class="empty-text">Ничего не найдено.</div>';
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";

        const variantsHtml = product.variants.length
          ? `<div class="variants">${product.variants.map(v => `<span class="variant">${v}</span>`).join("")}</div>`
          : "";

        card.innerHTML = `
           ${product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image">` : ""}
          <div class="card-content">
            <h3>${product.name}</h3>
            <div class="desc">${product.desc}</div>
            <div class="stock">${product.stock}</div>
            ${variantsHtml}
            <div class="card-footer">
              <div class="price">${formatPrice(product.price)}</div>
              <button class="btn btn-primary">В корзину</button>
            </div>
          </div>
        `;

        card.querySelector("button").onclick = () => addToCart(product.id);
        list.appendChild(card);
      });
    }

    function renderCart() {
      const wrap = document.getElementById("cartItems");
      const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
      const total = cart.reduce((sum, item) => sum + (item.price || 0) * item.qty, 0);

      document.getElementById("summaryItems").textContent = totalItems;
      document.getElementById("summaryTotal").textContent = formatPrice(total);

      if (!cart.length) {
        wrap.innerHTML = '<div class="empty-text">Корзина пока пустая.</div>';
        return;
      }

      wrap.innerHTML = "";

      cart.forEach(item => {
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <div class="cart-top">
            <div>
              <h4>${item.name}</h4>
              <div class="cart-price">${formatPrice(item.price)}</div>
            </div>
            <button class="btn btn-outline" style="padding:8px 10px;" onclick="removeItem(${item.id})">X</button>
          </div>
          <div class="cart-actions">
            <div class="qty-controls">
              <button onclick="decreaseQty(${item.id})">-</button>
              <span>${item.qty}</span>
              <button onclick="increaseQty(${item.id})">+</button>
            </div>
            <div><strong>${formatPrice((item.price || 0) * item.qty)}</strong></div>
          </div>
        `;
        wrap.appendChild(div);
      });
    }

    function updateCartButton() {
      const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById("cartBtn").textContent = `Корзина (${totalItems})`;
    }

    function switchView(view) {
      const shopView = document.getElementById("shopView");
      const cartView = document.getElementById("cartView");
      const shopBtn = document.getElementById("shopBtn");
      const cartBtn = document.getElementById("cartBtn");

      if (view === "shop") {
        shopView.classList.remove("hidden");
        cartView.classList.add("hidden");
        shopBtn.classList.add("active");
        cartBtn.classList.remove("active");
      } else {
        shopView.classList.add("hidden");
        cartView.classList.remove("hidden");
        shopBtn.classList.remove("active");
        cartBtn.classList.add("active");
      }
    }

    function submitOrder() {
      if (!cart.length) {
        alert("Корзина пустая");
        return;
      }

      const name = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("customerPhone").value.trim();
      const delivery = document.getElementById("customerDelivery").value.trim() || "Не указано";

      const total = cart.reduce((sum, item) => sum + (item.price || 0) * item.qty, 0);

      const orderText = [
        "Новый заказ TechGear",
        "",
        `Имя: ${name || "Не указано"}`,
        `Телефон: ${phone || "Не указан"}`,
        `Доставка: ${delivery}`,
        "",
        "Товары:",
        ...cart.map(item => `• ${item.name} × ${item.qty} — ${formatPrice((item.price || 0) * item.qty)}`),
        "",
        `Итого: ${formatPrice(total)}`
      ].join("\n");

      if (tg) {
        tg.sendData(orderText);
        tg.showAlert("Заказ отправлен. Скоро мы свяжемся с вами.");
      } else {
        alert(orderText);
      }
    }

    document.getElementById("searchInput").addEventListener("input", function(e) {
      search = e.target.value;
      renderProducts();
    });

    renderCategories();
    renderProducts();
    renderCart();
    updateCartButton();
  </script>
</body>
</html>
